{% extends 'base.html' %}

{% block title %}Log Center | BlueFalcon{% endblock %}
{% block header_title %}📋 Log Center{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto">
    <div class="flex gap-2 mb-6 border-b border-gray-200 dark:border-gray-700 pb-px">
        <a href="/logs?type=panel" class="px-6 py-3 font-bold text-sm rounded-t-lg transition {% if current_type == 'panel' %}bg-white dark:bg-gray-800 text-emerald-600 dark:text-emerald-400 border-t border-l border-r border-gray-200 dark:border-gray-700 -mb-px{% else %}text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200{% endif %}">Web Panel</a>
        
        <a href="/logs?type=openvpn" class="px-6 py-3 font-bold text-sm rounded-t-lg transition {% if current_type == 'openvpn' %}bg-white dark:bg-gray-800 text-emerald-600 dark:text-emerald-400 border-t border-l border-r border-gray-200 dark:border-gray-700 -mb-px{% else %}text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200{% endif %}">OpenVPN Core</a>
        
        <a href="/logs?type=warp" class="px-6 py-3 font-bold text-sm rounded-t-lg transition {% if current_type == 'warp' %}bg-white dark:bg-gray-800 text-emerald-600 dark:text-emerald-400 border-t border-l border-r border-gray-200 dark:border-gray-700 -mb-px{% else %}text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200{% endif %}">WARP Engine</a>
        
        <a href="/logs?type=system" class="px-6 py-3 font-bold text-sm rounded-t-lg transition {% if current_type == 'system' %}bg-white dark:bg-gray-800 text-emerald-600 dark:text-emerald-400 border-t border-l border-r border-gray-200 dark:border-gray-700 -mb-px{% else %}text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200{% endif %}">System Auth / Syslog</a>
    </div>

    <div class="bg-gray-900 rounded-xl shadow-lg border border-gray-700 overflow-hidden">
        <div class="bg-gray-800 px-4 py-2 flex items-center justify-between border-b border-gray-700">
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
            </div>
            <a href="/logs?type={{ current_type }}" class="text-xs font-bold text-gray-400 hover:text-white transition flex items-center gap-1">
                🔄 Refresh Logs
            </a>
        </div>
        <pre class="p-6 text-green-400 font-mono text-xs overflow-x-auto whitespace-pre-wrap leading-relaxed max-h-[70vh] overflow-y-auto">{{ logs }}</pre>
    </div>
</div>
{% endblock %}
