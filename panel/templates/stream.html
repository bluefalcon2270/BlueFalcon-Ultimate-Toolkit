<!DOCTYPE html>
<html lang="en">
<head>
    <title>Deploying System... | BlueFalcon</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-200 font-sans min-h-screen flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-4xl">
        <div class="mb-4 text-center">
            <h1 class="text-2xl font-bold text-white flex items-center justify-center gap-3">
                <svg class="animate-spin h-6 w-6 text-emerald-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                Deploying BlueFalcon Architecture
            </h1>
            <p class="text-gray-400 text-sm mt-2">Please do not close this window. The system will automatically redirect when finished.</p>
        </div>

        <div class="bg-black rounded-xl shadow-2xl border border-gray-700 overflow-hidden">
            <div class="bg-gray-800 px-4 py-2 flex items-center gap-2 border-b border-gray-700">
                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
                <span class="ml-2 text-xs text-gray-400 font-mono">root@bluefalcon:~# install_sequence</span>
            </div>
            <pre id="logOutput" class="p-4 text-green-400 font-mono text-sm h-[60vh] overflow-y-auto whitespace-pre-wrap leading-relaxed"></pre>
        </div>
    </div>

    <script>
        const logWindow = document.getElementById('logOutput');
        const source = new EventSource('/api/install_execute');

        source.onmessage = function(event) {
            if (event.data === "[DONE]") {
                source.close();
                window.location.href = "/login";
            } else {
                logWindow.innerHTML += event.data + "\n";
                logWindow.scrollTop = logWindow.scrollHeight;
            }
        };
    </script>
</body>
</html>
